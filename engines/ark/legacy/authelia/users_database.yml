# Authelia User Database (users_database.yml)
# Format: YAML with hashed passwords (PBKDF2)
#
# PASSWORD HASHING INSTRUCTIONS:
# 1. Generate password hash:
#    docker run --rm authelia/authelia:4.38.5 authelia hash-password 'your-password-here'
#
# 2. Output format:
#    Hash: $2a$12$... (bcrypt) OR $pbkdf2-sha512$... (PBKDF2)
#
# 3. Copy the hash value and paste below in the 'password' field
#
# FILE PERMISSIONS:
# chmod 600 authelia/users_database.yml
# Only readable by Authelia container (uid 1000) and root
#
# TOTP (2FA) SETUP:
# After user created:
# 1. User logs in to Authelia UI
# 2. Click "Settings" → "Two-Factor Authentication" → "TOTP"
# 3. Scan QR code with authenticator app (Google Authenticator, Authy, etc.)
# 4. TOTP secret auto-saved in Authelia Redis store

###############################################################################
# EXAMPLE USER: admin
# Default password: "ChangeMe123!" (MUST change in production)
#
# Hash generation:
#   docker run --rm authelia/authelia:4.38.5 authelia hash-password 'ChangeMe123!'
#
# Output (example):
#   Hash: $2a$12$e3lGZ8XJwXArv8/VIu2R4edm5g1OikM2nSvR53PocUGyMAK8yToiK
###############################################################################

users:
  admin:
    displayname: Administrator
    password: "$2a$12$e3lGZ8XJwXArv8/VIu2R4edm5g1OikM2nSvR53PocUGyMAK8yToiK"  # ChangeMe123!
    email: admin@example.com
    groups:
      - admins
      - users
    # TOTP secret (empty = disabled until user enables via web UI)
    totp: ""

  # EXAMPLE USER: user1
  user1:
    displayname: Regular User
    password: "$2a$12$e3lGZ8XJwXArv8/VIu2R4edm5g1OikM2nSvR53PocUGyMAK8yToiK"  # ChangeMe123!
    email: user1@example.com
    groups:
      - users
    totp: ""

###############################################################################
# GROUPS (optional: for fine-grained access control)
###############################################################################
# groups:
#   admins:
#     - admin
#   users:
#     - admin
#     - user1

###############################################################################
# INSTRUCTIONS FOR PRODUCTION:
#
# 1. GENERATE NEW PASSWORDS:
#    docker run --rm authelia/authelia:4.38.5 authelia hash-password
#    (will prompt for password input)
#
# 2. REPLACE EXAMPLE HASHES:
#    Copy output hash and replace values above
#
# 3. CHANGE USER EMAILS:
#    Update email@example.com → actual email address
#
# 4. SECURE FILE PERMISSIONS:
#    chmod 600 authelia/users_database.yml
#    chown 1000:1000 authelia/users_database.yml  (optional)
#
# 5. SET REDIS PASSWORD:
#    Update REDIS_PASSWORD in .env file
#    Must match: authelia/configuration.yml → session.redis.password
#
# 6. ENABLE TOTP (2FA):
#    Uncomment when user enables in Authelia UI:
#    totp: "JBSWY3DPEBLW64TMMQQQ===="  (example; generated by server)
###############################################################################
