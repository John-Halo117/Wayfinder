name: Architecture Governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run Architecture Doctor
        run: |
          ./wf architecture check --format markdown --fail-on-violations | tee architecture-health.md
          cat architecture-health.md >> "$GITHUB_STEP_SUMMARY"

      - name: Run architecture intelligence tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -s -q tests/test_architecture_intelligence.py
